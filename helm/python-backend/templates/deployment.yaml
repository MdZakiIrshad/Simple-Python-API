apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-python-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-python-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-python-backend
    spec:
      containers:
        - name: python-backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
